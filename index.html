<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>心電図検定 1級演習</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --panel: #f8fafc;
      --line: #d9e1ea;
      --text: #182230;
      --muted: #64748b;
      --blue: #2563eb;
      --green: #15803d;
      --amber: #b45309;
      --red: #b91c1c;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      line-height: 1.6;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      padding: 10px 14px;
      touch-action: manipulation;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      color: #94a3b8;
      background: #f8fafc;
      cursor: not-allowed;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.25);
      outline-offset: 2px;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 16px max(28px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0 14px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .small-link {
      min-height: 40px;
      white-space: nowrap;
      color: var(--blue);
      border-color: #c7d2fe;
      background: #f8fbff;
    }

    .notice {
      margin: 16px 0;
      padding: 12px 14px;
      border: 1px solid #f5d0a7;
      border-radius: var(--radius);
      color: #5f3712;
      background: #fffaf2;
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 282px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .side,
    .main-panel {
      min-width: 0;
    }

    .section-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .theme-grid,
    .mode-grid,
    .export-grid {
      display: grid;
      gap: 8px;
    }

    .theme-grid {
      grid-template-columns: 1fr;
    }

    .mode-grid,
    .export-grid {
      grid-template-columns: 1fr 1fr;
    }

    .filter-button,
    .mode-button,
    .export-button {
      width: 100%;
      text-align: left;
    }

    .filter-button[aria-pressed="true"],
    .mode-button[aria-pressed="true"] {
      border-color: var(--blue);
      background: #eef5ff;
      color: #123b83;
      font-weight: 750;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .search-box {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: #ffffff;
      color: var(--text);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 18px 0;
    }

    .stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .stat-value {
      display: block;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
    }

    .card-shell {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #edf2f7;
      color: #334155;
      font-size: 13px;
      font-weight: 750;
    }

    .card-count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .study-card {
      min-height: 390px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .face-label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .card-topic {
      margin: 0 0 10px;
      color: #0f172a;
      font-size: 15px;
      font-weight: 800;
    }

    .finding,
    .answer {
      margin: 0;
      font-size: 20px;
      font-weight: 750;
      line-height: 1.55;
    }

    .meta-lines {
      margin: 14px 0 0;
      padding: 12px 0 0;
      border-top: 1px solid var(--line);
      color: #334155;
      font-size: 15px;
    }

    .meta-lines p {
      margin: 7px 0;
    }

    .reason {
      margin: 14px 0 0;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: #334155;
      font-size: 15px;
    }

    .empty-state {
      min-height: 300px;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .controls,
    .judgement {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #fbfdff;
    }

    .controls {
      grid-template-columns: 1fr 1.3fr 1fr;
    }

    .judgement {
      grid-template-columns: 1fr 1fr;
    }

    .primary {
      color: #ffffff;
      border-color: var(--blue);
      background: var(--blue);
      font-weight: 750;
    }

    .understood {
      color: #ffffff;
      border-color: var(--green);
      background: var(--green);
      font-weight: 750;
    }

    .review {
      color: #ffffff;
      border-color: var(--amber);
      background: var(--amber);
      font-weight: 750;
    }

    .danger {
      color: var(--red);
      border-color: #fecaca;
      background: #fff5f5;
    }

    .status-line {
      min-height: 26px;
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .export-result {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .export-result[hidden] {
      display: none;
    }

    .export-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .export-text {
      width: 100%;
      min-height: 160px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      padding: 10px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    details {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    summary {
      min-height: 46px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 750;
    }

    .details-body {
      padding: 0 14px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .details-body ul {
      margin: 8px 0 0;
      padding-left: 1.2em;
    }

    @media (max-width: 720px) {
      .app {
        padding-left: 14px;
        padding-right: 14px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      h1 {
        font-size: 24px;
      }

      .layout {
        display: block;
      }

      .side {
        margin-bottom: 14px;
      }

      .theme-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-button {
        text-align: center;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin: 12px 0;
      }

      .stat {
        padding: 8px 6px;
        text-align: center;
      }

      .stat-value {
        font-size: 18px;
      }

      .stat-label {
        font-size: 11px;
      }

      .finding,
      .answer {
        font-size: 19px;
      }

      .study-card {
        min-height: 430px;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .controls .primary {
        grid-column: 1 / -1;
        order: -1;
      }
    }

    @media (max-width: 380px) {
      .theme-grid,
      .mode-grid,
      .export-grid,
      .judgement {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .finding,
      .answer {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>心電図検定 1級演習</h1>
        <p class="subtitle">高度な鑑別・落とし穴を反復する、iPhone向けカード</p>
      </div>
      <button class="small-link" id="shuffleButton" type="button">ランダム</button>
    </header>

    <p class="notice">
      1級相当の独自学習問題です。公式問題の転載ではありません。実臨床では患者背景、症状、12誘導全体、経時変化、最新の公式資料、施設プロトコルを必ず確認してください。
    </p>

    <div class="layout">
      <aside class="side" aria-label="学習設定">
        <p class="section-title">テーマ</p>
        <div class="theme-grid" id="themeButtons"></div>

        <div class="stats" aria-label="進捗">
          <div class="stat">
            <span class="stat-value" id="totalCount">0</span>
            <span class="stat-label">対象</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="doneCount">0</span>
            <span class="stat-label">理解</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="reviewCount">0</span>
            <span class="stat-label">復習</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="newCount">0</span>
            <span class="stat-label">未判定</span>
          </div>
        </div>

        <p class="section-title">検索</p>
        <div class="search-row">
          <input class="search-box" id="keywordInput" type="search" placeholder="例: WPW, VT, aVR">
          <button id="clearSearchButton" type="button">消去</button>
        </div>

        <p class="section-title" style="margin-top:18px;">出題</p>
        <div class="mode-grid">
          <button class="mode-button" id="allModeButton" type="button" aria-pressed="true">全カード</button>
          <button class="mode-button" id="reviewModeButton" type="button" aria-pressed="false">要復習のみ</button>
        </div>

        <p class="section-title" style="margin-top:18px;">データ</p>
        <div class="export-grid">
          <button class="export-button" id="jsonExportButton" type="button">JSON</button>
          <button class="export-button" id="csvExportButton" type="button">CSV</button>
        </div>
        <button class="danger" id="resetButton" type="button" style="width:100%; margin-top:8px;">進捗をリセット</button>
      </aside>

      <section class="main-panel" aria-live="polite">
        <div class="card-shell" id="cardShell">
          <div class="card-head">
            <span class="badge" id="themeBadge">テーマ</span>
            <span class="card-count" id="cardCount">0 / 0</span>
          </div>

          <article class="study-card" id="studyCard" tabindex="0" role="button" aria-label="カードを裏返す">
            <div id="cardContent"></div>
          </article>

          <div class="controls">
            <button id="prevButton" type="button">前へ</button>
            <button class="primary" id="flipButton" type="button">解説を見る</button>
            <button id="nextButton" type="button">次へ</button>
          </div>

          <div class="judgement">
            <button class="understood" id="understoodButton" type="button">理解した</button>
            <button class="review" id="needsReviewButton" type="button">要復習</button>
          </div>
        </div>

        <p class="status-line" id="statusLine"></p>

        <div class="export-result" id="exportResult" hidden>
          <label class="export-label" for="exportText" id="exportLabel">エクスポート結果</label>
          <textarea class="export-text" id="exportText" readonly></textarea>
        </div>

        <details>
          <summary>収録論点</summary>
          <div class="details-body">
            <p id="bankSummary"></p>
            <ul id="topicList"></ul>
          </div>
        </details>
      </section>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "ecgKenteiLevel1State.v2";
    const ALL_THEME = "すべて";
    const BASE_THEMES = [
      ALL_THEME,
      "脚ブロック",
      "房室ブロック",
      "WPW",
      "頻脈",
      "心筋梗塞",
      "ST-T鑑別",
      "肥大・負荷",
      "電解質・薬剤",
      "ペーシング",
      "若年者・正常変異",
      "アーチファクト"
    ];

    const contexts = [
      "症状だけでは決め手に欠ける場面",
      "救急外来で初回心電図だけを見た場面",
      "経時変化の確認が必要な場面"
    ];

    const baseCases = [
      {
        theme: "脚ブロック",
        topic: "右脚ブロック様波形とBrugada型",
        diagnosis: "Brugada型心電図を疑い、単純な右脚ブロックとして片付けない。",
        why: "V1〜V2のST形状が主所見で、QRS終末遅延だけでは説明しにくい時は右側胸部誘導の置き方も含めて評価します。",
        findings: ["V1〜V2でrSr'様だが、J点からcoved型にSTが上がる。", "V1のR'が高く、T波が陰転して右脚ブロックに見える。", "QRS幅は境界域だが、右側胸部誘導でST上昇が目立つ。"],
        clues: ["高位肋間でST上昇が強調される。", "I・V6の幅広いS波が典型的右脚ブロックほど明瞭でない。", "発熱や薬剤で波形が変動しうる。"],
        traps: ["右脚ブロックのラベルだけで終えると危険な所見を見落とす。", "若年者の不完全右脚ブロックと混同しやすい。", "ST上昇の形を見ずにQRS幅だけで判断しやすい。"]
      },
      {
        theme: "脚ブロック",
        topic: "左脚ブロック中の急性冠症候群",
        diagnosis: "左脚ブロックに合併した急性虚血を疑う。",
        why: "左脚ブロックでは二次性ST-T変化が基本ですが、QRS方向に対して不釣り合いなST変化は虚血を示唆します。",
        findings: ["左脚ブロック波形に加え、V1〜V3で過度のST低下がある。", "幅広いQRSの方向と一致しないST上昇が連続誘導にある。", "V5〜V6のR波優位誘導でdiscordantなST上昇が大きい。"],
        clues: ["修正Sgarbossaの考え方でST/S比を確認したい。", "胸痛の有無だけでなく旧心電図との差が重要。", "ペーシング波形でも同様の考え方を応用する。"],
        traps: ["左脚ブロックだからSTは読めない、と決めつけない。", "二次性変化と一次性虚血を分ける視点が必要。", "単一誘導ではなく連続誘導で評価する。"]
      },
      {
        theme: "脚ブロック",
        topic: "二枝ブロックと伝導障害リスク",
        diagnosis: "右脚ブロックに左脚前枝ブロックを伴う二枝ブロックを考える。",
        why: "右脚ブロック所見に左軸偏位が加わると、His-Purkinje系の広い障害を示唆します。",
        findings: ["rsR'型の右脚ブロックに、著明な左軸偏位を伴う。", "I誘導でqR、II・III・aVFでrS、V1でrsR'を認める。", "QRS幅延長に加え、下壁誘導で深いS波が目立つ。"],
        clues: ["PR延長を伴う時は進行性伝導障害の文脈で見る。", "失神や徐脈発作の有無を確認したい。", "後枝ブロックとの軸の向きの違いを確認する。"],
        traps: ["左軸偏位を左室肥大だけで説明しない。", "三枝ブロックという言葉を安易に診断名として使わない。", "単なる右脚ブロックより伝導障害の広がりを意識する。"]
      },
      {
        theme: "脚ブロック",
        topic: "左脚後枝ブロックの鑑別",
        diagnosis: "左脚後枝ブロックを鑑別に入れる。",
        why: "右軸偏位と下壁誘導のqR、I・aVLのrSがそろう時に考えますが、右室肥大や側壁梗塞の除外が必要です。",
        findings: ["右軸偏位が強く、II・III・aVFでqRを示す。", "I・aVLでrS、下壁誘導でR波優位を示す。", "右脚ブロック様波形に右軸偏位が合併する。"],
        clues: ["肺疾患や右室負荷の臨床背景がないかを確認する。", "側壁梗塞の異常Q波との関係を確認する。", "左脚前枝ブロックより頻度が低く、除外診断の要素が強い。"],
        traps: ["右軸偏位だけで後枝ブロックと断定しない。", "下壁誘導のqRを梗塞だけで説明しない。", "頻度が低い所見ほど鑑別を丁寧に置く。"]
      },
      {
        theme: "脚ブロック",
        topic: "変行伝導と心室起源の鑑別",
        diagnosis: "上室性期外収縮の変行伝導を考えるが、心室期外収縮も除外する。",
        why: "先行RR短縮後に脚の不応期へ入り、右脚ブロック型の幅広いQRSを作ることがあります。",
        findings: ["早いタイミングの幅広いQRSが右脚ブロック様に出現する。", "直前RRが短く、その後にwide QRSが続く。", "P波らしき成分がwide QRSに先行する。"],
        clues: ["Ashman現象では長短周期後に変行しやすい。", "代償性休止の完全性を確認する。", "同じ形のwide QRSが連発するなら頻拍の評価へ進む。"],
        traps: ["wide QRSをすべて心室性と決めない。", "P波の位置を見落とすと診断が逆になる。", "心房細動中の変行伝導は心室期外収縮に似る。"]
      },
      {
        theme: "房室ブロック",
        topic: "Wenckebach型とblocked PAC",
        diagnosis: "Wenckebach型房室ブロックと非伝導性PACを鑑別する。",
        why: "PRが周期的に延長して脱落するのか、早期P波がT波に隠れてQRSが出ないのかで判断します。",
        findings: ["QRS脱落前にPRが少しずつ延長している。", "T波の形が脱落拍の直前だけ微妙に変形している。", "RR間隔が群発的に短長を繰り返す。"],
        clues: ["隠れた早期P波をT波上で探す。", "PP間隔が規則的かどうかを確認する。", "迷走神経緊張時のWenckebachは若年者でも見られる。"],
        traps: ["QRSが抜けたらすべて房室ブロックとは限らない。", "T波に埋もれたP波を見逃しやすい。", "治療判断では症状と部位推定が重要になる。"]
      },
      {
        theme: "房室ブロック",
        topic: "Mobitz II型の局在",
        diagnosis: "His-Purkinje系のMobitz II型房室ブロックを疑う。",

      },
      {
        theme: "頻脈",
        topic: "AF with aberrancyとPVC連発",
        diagnosis: "心房細動中の変行伝導とPVC連発を鑑別する。",
        why: "不規則RR中にwide QRSが混じる時、先行周期、連結期、QRS形の一貫性を見ます。",
        findings: ["AF中に右脚ブロック型のwide QRSが散発する。", "long-short sequenceの後にwide QRSが出る。", "wide QRSの形が比較的一定で連結期は一定しない。"],
        clues: ["Ashman現象では先行周期が手がかり。", "PVCでは代償性休止と固定連結期を見やすい。", "複数誘導でQRS初期ベクトルを比較する。"],
        traps: ["AF中のwide QRSを全てPVCとしない。", "変行伝導を見落とすと過剰診断になる。", "多発する場合はVT移行も警戒する。"]
      },
      {
        theme: "心筋梗塞",
        topic: "超急性期T波",
        diagnosis: "超急性期心筋梗塞のT波変化を疑う。",
        why: "ST上昇が明瞭になる前に、局在した幅広く対称性の高いT波が出ることがあります。",
        findings: ["胸痛直後、前胸部誘導で幅広く対称性の高いT波がある。", "下壁誘導に局在したT波増高と軽いST変化がある。", "高Kほど広範ではなく、冠動脈領域に一致したT波増高がある。"],
        clues: ["経時変化を短時間で追う。", "鏡像変化や症状との一致を見る。", "高K血症の広範なテント状T波と比較する。"],
        traps: ["ST上昇前だから正常と判断しない。", "高Kと決めつけない。", "T波の高さだけでなく幅と局在を見る。"]
      }
    ];

    function buildCards() {
      const cards = [];
      baseCases.forEach((item, caseIndex) => {
        item.findings.forEach((finding, findingIndex) => {
          item.clues.forEach((clue, clueIndex) => {
            item.traps.forEach((trap, trapIndex) => {
              const context = contexts[(caseIndex + findingIndex + clueIndex + trapIndex) % contexts.length];
              const id = `l1-${String(caseIndex + 1).padStart(2, "0")}-${findingIndex + 1}${clueIndex + 1}${trapIndex + 1}`;
              cards.push({
                id,
                theme: item.theme,
                topic: item.topic,
                finding: `【${context}】${finding}`,
                clue,
                trap,
                diagnosis: item.diagnosis,
                reason: `${item.why} 補助所見として「${clue}」。鑑別の落とし穴は「${trap}」。1級相当では単一所見ではなく、誘導分布、軸、QRS幅、P波、ST-T、臨床文脈、旧心電図との差を組み合わせて判断します。`
              });
            });
          });
        });
      });
      return cards;
    }

    let cards = buildCards();
    let state = loadState();
    let currentTheme = BASE_THEMES.includes(state.currentTheme) ? state.currentTheme : ALL_THEME;
    let reviewOnly = Boolean(state.reviewOnly);
    let currentIndex = Number.isInteger(state.currentIndex) ? state.currentIndex : 0;
    let keyword = typeof state.keyword === "string" ? state.keyword : "";
    let showingBack = false;

    const elements = {
      themeButtons: document.getElementById("themeButtons"),
      totalCount: document.getElementById("totalCount"),
      doneCount: document.getElementById("doneCount"),
      reviewCount: document.getElementById("reviewCount"),
      newCount: document.getElementById("newCount"),
      keywordInput: document.getElementById("keywordInput"),
      clearSearchButton: document.getElementById("clearSearchButton"),
      allModeButton: document.getElementById("allModeButton"),
      reviewModeButton: document.getElementById("reviewModeButton"),
      themeBadge: document.getElementById("themeBadge"),
      cardCount: document.getElementById("cardCount"),
      cardContent: document.getElementById("cardContent"),
      studyCard: document.getElementById("studyCard"),
      flipButton: document.getElementById("flipButton"),
      prevButton: document.getElementById("prevButton"),
      nextButton: document.getElementById("nextButton"),
      understoodButton: document.getElementById("understoodButton"),
      needsReviewButton: document.getElementById("needsReviewButton"),
      statusLine: document.getElementById("statusLine"),
      exportResult: document.getElementById("exportResult"),
      exportText: document.getElementById("exportText"),
      exportLabel: document.getElementById("exportLabel"),
      jsonExportButton: document.getElementById("jsonExportButton"),
      csvExportButton: document.getElementById("csvExportButton"),
      resetButton: document.getElementById("resetButton"),
      shuffleButton: document.getElementById("shuffleButton"),
      bankSummary: document.getElementById("bankSummary"),
      topicList: document.getElementById("topicList")
    };

    elements.keywordInput.value = keyword;

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (parsed && typeof parsed === "object") {
          return {
            statuses: parsed.statuses && typeof parsed.statuses === "object" ? parsed.statuses : {},
            currentTheme: parsed.currentTheme,
            reviewOnly: parsed.reviewOnly,
            currentIndex: parsed.currentIndex,
            keyword: parsed.keyword
          };
        }
      } catch (error) {
        // LocalStorageが使えない場合も、現在のセッションでは学習できるようにします。
      }
      return { statuses: {}, currentTheme: ALL_THEME, reviewOnly: false, currentIndex: 0, keyword: "" };
    }

    function saveState() {
      state.currentTheme = currentTheme;
      state.reviewOnly = reviewOnly;
      state.currentIndex = currentIndex;
      state.keyword = keyword;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (error) {
        // プライベートブラウズなどで保存できない場合は、画面操作だけ継続します。
      }
    }

    function matchesKeyword(card) {
      const query = keyword.trim().toLowerCase();
      if (!query) return true;
      const haystack = `${card.theme} ${card.topic} ${card.finding} ${card.clue} ${card.trap} ${card.diagnosis} ${card.reason}`.toLowerCase();
      return haystack.includes(query);
    }

    function getVisibleCards() {
      return cards.filter((card) => {
        const themeMatch = currentTheme === ALL_THEME || card.theme === currentTheme;
        const reviewMatch = !reviewOnly || state.statuses[card.id] === "review";
        return themeMatch && reviewMatch && matchesKeyword(card);
      });
    }

    function getThemeCards() {
      return cards.filter((card) => {
        const themeMatch = currentTheme === ALL_THEME || card.theme === currentTheme;
        return themeMatch && matchesKeyword(card);
      });
    }

    function clampIndex(visibleCards) {
      if (visibleCards.length === 0) {
        currentIndex = 0;
        return;
      }
      if (currentIndex < 0) currentIndex = visibleCards.length - 1;
      if (currentIndex >= visibleCards.length) currentIndex = 0;
    }

    function renderThemeButtons() {
      elements.themeButtons.innerHTML = "";
      BASE_THEMES.forEach((theme) => {
        const button = document.createElement("button");
        button.className = "filter-button";
        button.type = "button";
        button.textContent = theme;
        button.setAttribute("aria-pressed", String(theme === currentTheme));
        button.addEventListener("click", () => {
          currentTheme = theme;
          currentIndex = 0;
          showingBack = false;
          render();
        });
        elements.themeButtons.appendChild(button);
      });
    }

    function renderStats() {
      const targetCards = getThemeCards();
      const done = targetCards.filter((card) => state.statuses[card.id] === "understood").length;
      const review = targetCards.filter((card) => state.statuses[card.id] === "review").length;
      const unanswered = targetCards.length - done - review;

      elements.totalCount.textContent = targetCards.length;
      elements.doneCount.textContent = done;
      elements.reviewCount.textContent = review;
      elements.newCount.textContent = unanswered;
    }

    function renderModeButtons() {
      elements.allModeButton.setAttribute("aria-pressed", String(!reviewOnly));
      elements.reviewModeButton.setAttribute("aria-pressed", String(reviewOnly));
    }

    function renderTopicList() {
      elements.bankSummary.textContent = `${baseCases.length}論点から${cards.length}問を生成しています。問題文と解説は独自作成です。`;
      elements.topicList.innerHTML = "";
      baseCases.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = `${item.theme}: ${item.topic}`;
        elements.topicList.appendChild(li);
      });
    }

    function renderCard() {
      const visibleCards = getVisibleCards();
      clampIndex(visibleCards);

      if (visibleCards.length === 0) {
        elements.themeBadge.textContent = reviewOnly ? "要復習なし" : currentTheme;
        elements.cardCount.textContent = "0 / 0";
        elements.cardContent.innerHTML = `
          <div class="empty-state">
            <div>
              <p class="face-label">表示できるカードがありません</p>
              <p>テーマ、検索語、要復習モードを見直してください。</p>
            </div>
          </div>
        `;
        elements.flipButton.disabled = true;
        elements.prevButton.disabled = true;
        elements.nextButton.disabled = true;
        elements.understoodButton.disabled = true;
        elements.needsReviewButton.disabled = true;
        elements.statusLine.textContent = "条件に合うカードがありません。";
        return;
      }

      const card = visibleCards[currentIndex];
      const status = state.statuses[card.id];
      const statusText = status === "understood" ? "理解した" : status === "review" ? "要復習" : "未判定";

      elements.themeBadge.textContent = card.theme;
      elements.cardCount.textContent = `${currentIndex + 1} / ${visibleCards.length}`;
      elements.flipButton.disabled = false;
      elements.prevButton.disabled = false;
      elements.nextButton.disabled = false;
      elements.understoodButton.disabled = false;
      elements.needsReviewButton.disabled = false;
      elements.flipButton.textContent = showingBack ? "所見に戻る" : "解説を見る";

      // 表面は「所見、補助所見、ひっかけ」を分け、1級で必要な鑑別の視点を保つ。
      elements.cardContent.innerHTML = showingBack
        ? `
          <div>
            <p class="face-label">診断候補・理由</p>
            <p class="card-topic">${escapeHtml(card.topic)}</p>
            <p class="answer">${escapeHtml(card.diagnosis)}</p>
            <p class="reason">${escapeHtml(card.reason)}</p>
          </div>
        `
        : `
          <div>
            <p class="face-label">所見</p>
            <p class="card-topic">${escapeHtml(card.topic)}</p>
            <p class="finding">${escapeHtml(card.finding)}</p>
            <div class="meta-lines">
              <p><strong>補助所見:</strong> ${escapeHtml(card.clue)}</p>
              <p><strong>ひっかけ:</strong> ${escapeHtml(card.trap)}</p>
            </div>
          </div>
        `;
      elements.statusLine.textContent = `現在の判定: ${statusText} / ID: ${card.id}`;
    }

    function render() {
      renderThemeButtons();
      renderStats();
      renderModeButtons();
      renderCard();
      renderTopicList();
      saveState();
    }

    function flipCard() {
      if (getVisibleCards().length === 0) return;
      showingBack = !showingBack;
      renderCard();
    }

    function moveCard(delta) {
      const visibleCards = getVisibleCards();
      if (visibleCards.length === 0) return;
      currentIndex += delta;
      showingBack = false;
      clampIndex(visibleCards);
      saveState();
      renderCard();
    }

    function markCard(status) {
      const visibleCards = getVisibleCards();
      if (visibleCards.length === 0) return;
      const card = visibleCards[currentIndex];
      state.statuses[card.id] = status;
      showingBack = false;

      // 要復習モード中に理解済みにするとカードが一覧から外れるため、同じ位置で再描画します。
      const updatedVisible = getVisibleCards();
      if (currentIndex >= updatedVisible.length) {
        currentIndex = Math.max(0, updatedVisible.length - 1);
      }

      render();
    }

    function shuffleVisibleCards() {
      const visibleCards = getVisibleCards();
      if (visibleCards.length < 2) return;
      const visibleIds = new Set(visibleCards.map((card) => card.id));
      const randomRank = new Map(visibleCards.map((card) => [card.id, Math.random()]));

      cards = cards.slice().sort((a, b) => {
        const aVisible = visibleIds.has(a.id);
        const bVisible = visibleIds.has(b.id);
        if (aVisible && bVisible) return randomRank.get(a.id) - randomRank.get(b.id);
        if (aVisible) return -1;
        if (bVisible) return 1;
        return a.id.localeCompare(b.id);
      });

      currentIndex = 0;
      showingBack = false;
      render();
    }

    function makeExportRows() {
      return cards.map((card) => ({
        id: card.id,
        theme: card.theme,
        topic: card.topic,
        finding: card.finding,
        clue: card.clue,
        trap: card.trap,
        diagnosis: card.diagnosis,
        reason: card.reason,
        status: state.statuses[card.id] || "unanswered"
      }));
    }

    function exportJson() {
      const payload = {
        app: "心電図検定 1級演習",
        exportedAt: new Date().toISOString(),
        note: "学習用データです。患者情報は含みません。公式問題の転載ではありません。",
        totalCards: cards.length,
        cards: makeExportRows()
      };
      const text = JSON.stringify(payload, null, 2);
      showExportText("JSON", text);
      downloadText("ecg-kentei-level1-progress.json", text, "application/json");
    }

    function exportCsv() {
      const header = ["id", "theme", "topic", "finding", "clue", "trap", "diagnosis", "reason", "status"];
      const rows = makeExportRows().map((card) => header.map((key) => card[key]));
      const csv = [header, ...rows].map((row) => row.map(csvEscape).join(",")).join("\n");
      showExportText("CSV", csv);
      downloadText("ecg-kentei-level1-progress.csv", "\ufeff" + csv, "text/csv;charset=utf-8");
    }

    function downloadText(filename, text, type) {
      try {
        const blob = new Blob([text], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      } catch (error) {
        elements.statusLine.textContent = "ダウンロードできない場合は、表示された内容をコピーしてください。";
      }
    }

    function showExportText(kind, text) {
      elements.exportResult.hidden = false;
      elements.exportLabel.textContent = `${kind}エクスポート結果`;
      elements.exportText.value = text;
      elements.exportText.focus();
      elements.exportText.select();
      elements.statusLine.textContent = `${kind}を作成しました。ダウンロードまたはコピーで保存できます。`;
    }

    function resetProgress() {
      const confirmed = window.confirm("理解・要復習の記録をすべて削除します。よろしいですか？");
      if (!confirmed) return;
      state = { statuses: {}, currentTheme, reviewOnly: false, currentIndex: 0, keyword: "" };
      reviewOnly = false;
      currentIndex = 0;
      keyword = "";
      elements.keywordInput.value = "";
      showingBack = false;
      render();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function csvEscape(value) {
      return `"${String(value).replaceAll('"', '""')}"`;
    }

    elements.keywordInput.addEventListener("input", () => {
      keyword = elements.keywordInput.value;
      currentIndex = 0;
      showingBack = false;
      render();
    });

    elements.clearSearchButton.addEventListener("click", () => {
      keyword = "";
      elements.keywordInput.value = "";
      currentIndex = 0;
      showingBack = false;
      render();
    });

    elements.allModeButton.addEventListener("click", () => {
      reviewOnly = false;
      currentIndex = 0;
      showingBack = false;
      render();
    });

    elements.reviewModeButton.addEventListener("click", () => {
      reviewOnly = true;
      currentIndex = 0;
      showingBack = false;
      render();
    });

    elements.flipButton.addEventListener("click", flipCard);
    elements.studyCard.addEventListener("click", flipCard);
    elements.studyCard.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        flipCard();
      }
    });

    elements.prevButton.addEventListener("click", () => moveCard(-1));
    elements.nextButton.addEventListener("click", () => moveCard(1));
    elements.understoodButton.addEventListener("click", () => markCard("understood"));
    elements.needsReviewButton.addEventListener("click", () => markCard("review"));
    elements.jsonExportButton.addEventListener("click", exportJson);
    elements.csvExportButton.addEventListener("click", exportCsv);
    elements.resetButton.addEventListener("click", resetProgress);
    elements.shuffleButton.addEventListener("click", shuffleVisibleCards);

    render();
  </script>
</body>
</html>
